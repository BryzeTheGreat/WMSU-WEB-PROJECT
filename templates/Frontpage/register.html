<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="{{ url_for('static', filename='Frontpage/register/register.css') }}">
    </head>

    <body>
        <nav class="navbar">
            <div class="navlogo"></div>
            <a href="logout">Logout</a>
        </nav>
        
        <div class="register-box">
            <h1>REGISTER</h1>
            <form method="POST">
                <input type="text" name="username" id="username" placeholder="Username">
                <input type="password" name="password" id="password" placeholder="Password">
                <input type="password" name="verify-password" id="verify-password" placeholder="Re-enter Password">
                <button id="submitbtn">Sign Up</button>
                <h3 id="error" style="color: red;">
                    {% if error %}  
                        {{ error }}
                    {% endif %}
                </h3>
            </form>
            <div class="registerlogo"></div>
            <a href="/">Already Have an account?</a>
        </div>

        <script src="{{ url_for('static', filename='Frontpage/register/register.js') }}"></script>
    </body>
</html>
